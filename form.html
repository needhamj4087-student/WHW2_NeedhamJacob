    <h1 style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; margin-left: 12px;">how I can reach you...</h1><br/><br/>

    <form action="#" method="post" style="text-align: center; border: groove; border-radius: 15px; border-color:black ">

        <label for="name">First Name and Last Name</label><br/>
        <input type="text" id="name"><br/>

        <select id="language">
            <label for="language">Select your prefered method of contact</label><br/>

                <option>Email</option>
                <option>Call</option>
                <option>Other</option>
        </select> <br/>



        <label >Best Time to Talk</label><br/>

        </label><br/>
        <label><input type="radio" value="3-4 pm">3-4 PM 
        </label><br/>

        <label for="comments">Comments</label><br/>
        <textarea id="comments" style="background-color: yellow;"></textarea><br/>

        <button type="submit" style="background-color: orange;">Submit</button>
        <button type="reset" style="background-color: rgb(255, 38, 0);">Reset</button>
